<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProgressShelf - Track everything. One bar at a time.</title>
  <meta name="description" content="ProgressShelf is your personal progress tracking dashboard. Track your habits, courses, readings, or custom goals, one animated progress bar at a time.">
  <link rel="stylesheet" href="index.css?v=1.1">
</head>
<body>

  <!-- Configuration Warning Banner (Dynamic) -->
  <div id="config-banner" class="config-warning-banner hidden">
    <span>⚠️ <strong>Firebase Configuration Required:</strong> Copy <code>firebase-config.template.js</code> to <code>firebase-config.js</code> and fill in your project credentials to get started. Alternatively, you can use the local sandbox.</span>
  </div>

  <main class="landing-container">
    <div class="landing-card">
      <div class="logo-container">
        <span class="logo-icon">📊</span>
        <h1 class="logo-text">ProgressShelf</h1>
      </div>
      <p class="landing-tagline">Track everything. One bar at a time.</p>

      <button id="btn-login" class="btn-google">
        <svg viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24c0-1.55-.15-3.24-.47-4.77H24v9.03h12.75c-.55 3-2.22 5.54-4.71 7.2l7.3 5.66c4.27-3.93 6.96-9.72 6.96-17.12z"/>
          <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.3-5.66c-2.11 1.41-4.8 2.27-8.59 2.27-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span id="login-btn-text">Sign in with Google</span>
      </button>
      
      <p id="error-message" style="color: var(--error); margin-top: 16px; font-size: 0.9rem;" class="hidden"></p>
    </div>
  </main>

  <script type="module">
    import { isConfigured } from "./firebase-config.js";
    import { loginWithGoogle, initAuthProtection } from "./auth.js";

    const configBanner = document.getElementById("config-banner");
    const loginBtn = document.getElementById("btn-login");
    const loginBtnText = document.getElementById("login-btn-text");
    const errorMsg = document.getElementById("error-message");

    // Initialize Auth listener to redirect if user is already logged in
    if (isConfigured) {
      initAuthProtection();
    } else {
      // Show error setup warning if configuration file is missing/dummy
      configBanner.classList.remove("hidden");
      loginBtnText.textContent = "Enter Local Sandbox Mode";
    }

    // Handle Login Button Trigger
    loginBtn.addEventListener("click", async () => {
      errorMsg.classList.add("hidden");
      loginBtn.style.pointerEvents = "none";
      const originalText = loginBtnText.textContent;
      loginBtnText.textContent = isConfigured ? "Signing in..." : "Launching Sandbox...";
      
      try {
        await loginWithGoogle();
        // Redirect is handled by onAuthStateChanged / initAuthProtection in auth.js
      } catch (error) {
        console.error(error);
        errorMsg.textContent = error.message || "Failed to authenticate. Please try again.";
        errorMsg.classList.remove("hidden");
        loginBtn.style.pointerEvents = "all";
        loginBtnText.textContent = originalText;
      }
    });
  </script>
</body>
</html>
